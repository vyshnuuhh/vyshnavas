<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Server Down</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="glow"></div>

    <h1>404</h1>
    <h2>Server Down</h2>

    <p>
        The page you're looking for is currently unavailable.
        Our servers are working to restore the service.
    </p>

    <div class="buttons">
        <button onclick="goHome()">Go Home</button>
        <button onclick="reloadPage()">Retry</button>
    </div>

    <div class="status">
        <span class="dot"></span>
        Server Status: Offline
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
